services:
  - type: web
    name: apartment-saas
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    
    envVars:
    APP_BASE_URL=$RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: apartment-saas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_API_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        value: /api

databases:
  - name: apartment-saas-db
    databaseName: apartment
    user: apartment_user
    plan: free
