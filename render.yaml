services:
  - type: web
    name: apartment-saas
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apartment-saas-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      # 🔥 kritik: otomatik base URL
      - key: APP_BASE_URL
        fromService:
          type: web
          name: apartment-saas
          property: url

      # email config
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_API_KEY
        sync: false

      # frontend → backend API
      - key: NEXT_PUBLIC_API_URL
        value: /api

databases:
  - name: apartment-saas-db
    databaseName: apartment
    user: apartment_user
    plan: free
