services:
  - type: web
    name: apartment-saas
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apartment-saas-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_BASE_URL
        fromService:
          type: web
          name: apartment-saas
          property: url
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_API_KEY
        sync: false

databases:
  - name: apartment-saas-db
    databaseName: apartment
    user: apartment_user
    plan: free
